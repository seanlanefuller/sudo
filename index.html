<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Sudoku</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png?v=2">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Splash Screen -->
    <div id="splash-screen">
        <div class="splash-content">
            <h1>Sudoku</h1>
            <div class="loader"></div>
        </div>
        <footer class="splash-footer">
            <p>Copyleft &copy; Sean Lane Fuller</p>
        </footer>
    </div>

    <!-- Game Container -->
    <div id="game-container" class="hidden">
        <header>
            <div class="header-top">
                <h1>Sudoku</h1>
                <div class="difficulty-selector">
                    <button class="diff-btn active" data-level="easy">Easy</button>
                    <button class="diff-btn" data-level="medium">Med</button>
                    <button class="diff-btn" data-level="hard">Hard</button>
                </div>
            </div>
            <div class="mistakes">Errors: <span id="error-count">0</span>/3</div>
        </header>

        <section id="board-area">
            <div id="sudoku-board">
                <!-- Grid generated by JS -->
            </div>
        </section>

        <section id="controls-area">
            <div class="numpad">
                <button class="num-btn" data-num="1">1</button>
                <button class="num-btn" data-num="2">2</button>
                <button class="num-btn" data-num="3">3</button>
                <button class="num-btn" data-num="4">4</button>
                <button class="num-btn" data-num="5">5</button>
                <button class="num-btn" data-num="6">6</button>
                <button class="num-btn" data-num="7">7</button>
                <button class="num-btn" data-num="8">8</button>
                <button class="num-btn" data-num="9">9</button>
                <button class="action-btn" id="erase-btn">⌫</button>
                <button class="action-btn" id="new-game-btn">New</button>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>

</html>
